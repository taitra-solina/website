.reveal {

.reveal-delay-1 { transition-delay: 0.1s; }

@media (prefers-reduced-motion: reduce) {

/* ── Hooks ── */
function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold: 0.15, rootMargin: '0px 0px -40px 0px' }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, className = '', delay = 0 }) {
  const [ref, visible] = useReveal();
  return (
    <div ref={ref} className={`reveal ${visible ? 'visible' : ''} ${delay ? 'reveal-delay-'+delay : ''} ${className}`}>
      {children}
    </div>
  );
}

function Counter({ end, suffix = '', prefix = '', unit = '', duration = 1800 }) {
  const [ref, visible] = useReveal();
  const [display, setDisplay] = useState(prefix + '0' + suffix + unit);
  useEffect(() => {
    if (!visible) return;
    const start = performance.now();
    const step = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      const val = Number.isInteger(end) ? Math.round(ease * end) : (Math.round(ease * end * 10) / 10).toFixed(1);
      setDisplay(prefix + Number(val).toLocaleString() + suffix + unit);
      if (t < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [visible]);
  return <span ref={ref}>{display}</span>;
}

function BackToTop({ show }) {
  const smooth = !window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  return (

      onClick={() => window.scrollTo({ top: 0, behavior: smooth ? 'smooth' : 'auto' })}>↑</button>
  );
}

function BarChart({ data, maxVal }) {
  const [ref, visible] = useReveal();
  return (
    <div ref={ref} className={`bar-chart reveal ${visible ? 'visible' : ''}`}>
      {data.map((d, i) => (
        <div className="bar-row" key={i}>
          <div className="bar-label" title={d.name}>{d.name}</div>
          <div className="bar-track">
            <div className={`bar-fill ${d.overseas ? 'bar-fill--overseas' : 'bar-fill--domestic'}`}
              style={{ width: visible ? `${(d.count / maxVal * 100).toFixed(1)}%` : '0%' }} />
          </div>
          <div className="bar-value">{d.count.toLocaleString()}</div>
        </div>
      ))}
    </div>
  );
}

function DupPieChart({ dup, total }) {
  const pct = dup / total;
  const r = 80, C = 2 * Math.PI * r;
  const dashDup = C * pct, dashNon = C - dashDup;
  return (
    <div className="pie-container">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r={r} fill="none" stroke="var(--border-light)" strokeWidth="24" />
        <circle cx="100" cy="100" r={r} fill="none" stroke="var(--accent)" strokeWidth="24"
          strokeDasharray={`${dashDup} ${dashNon}`} strokeDashoffset={C * 0.25}
          strokeLinecap="round" style={{ transition: 'stroke-dasharray 1.5s ease' }} />
        <circle cx="100" cy="100" r={r} fill="none" stroke="var(--blue)" strokeWidth="24"
          strokeDasharray={`${dashNon} ${dashDup}`} strokeDashoffset={C * 0.25 - dashDup}
          strokeLinecap="round" style={{ transition: 'stroke-dasharray 1.5s ease' }} />
        <text x="100" y="94" textAnchor="middle" fill="var(--accent)"
          fontFamily="Inter" fontWeight="900" fontSize="32">{(pct*100).toFixed(1)}%</text>
        <text x="100" y="118" textAnchor="middle" fill="var(--text-muted)"
          fontFamily="Noto Sans TC" fontSize="13">重複比例</text>
      </svg>
      <div className="pie-legend">
        <div className="pie-legend-item">
          <div className="pie-dot" style={{background:'var(--accent)'}}></div>
          <span>重複公司 <strong>{dup.toLocaleString()}</strong></span>
        </div>
        <div className="pie-legend-item">
          <div className="pie-dot" style={{background:'var(--blue)'}}></div>
          <span>不重複公司 <strong>{(total-dup).toLocaleString()}</strong></span>
        </div>
      </div>
    </div>
  );
}

function SourcePieChart({ sources }) {
  const total = sources.reduce((s, d) => s + d.count, 0);
  const r = 75, C = 2 * Math.PI * r;
  let offset = C * 0.25;
  const slices = sources.map(d => {
    const pct = d.count / total;
    const dash = C * pct;
    const slice = { ...d, pct, dash, offset };
    offset -= dash;
    return slice;
  });
  return (
    <div className="source-pie-container">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <circle cx="90" cy="90" r={r} fill="none" stroke="var(--border-light)" strokeWidth="22" />
        {slices.map((s, i) => (
          <circle key={i} cx="90" cy="90" r={r} fill="none" stroke={s.color} strokeWidth="22"
            strokeDasharray={`${s.dash} ${C - s.dash}`} strokeDashoffset={s.offset}
            style={{ transition: 'stroke-dasharray 1.2s ease' }} />
        ))}
        <text x="90" y="86" textAnchor="middle" fill="var(--text)" fontFamily="Inter" fontWeight="900" fontSize="22">
          {total.toLocaleString()}
        </text>
        <text x="90" y="104" textAnchor="middle" fill="var(--text-muted)" fontFamily="Noto Sans TC" fontSize="11">
          筆公司
        </text>
      </svg>
      <div className="source-legend">
        {sources.map((s, i) => (
          <div className="source-legend-row" key={i}>
            <div className="source-legend-dot" style={{background: s.color}}></div>
            <span>{s.source}</span>
            <span className="source-legend-count">{s.count.toLocaleString()}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
