<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAITRA數據治理 — HB公司重複問題解決方案建議</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --white: #FFFFFF;
      --bg: #F5F6FA;
      --bg-card: #FFFFFF;
      --orange: #E85D04;
      --orange-dark: #C44D03;
      --orange-light: #FFF1E8;
      --orange-soft: #FFD6BA;
      --deep-blue: #1B2A4A;
      --navy: #253B6E;
      --muted-blue: #4A6FA5;
      --light-blue: #E8EEF6;
      --pale-blue: #D6E4F0;
      --golden: #E6940A;
      --text-primary: #1A1A2E;
      --text-body: #2D3748;
      --text-secondary: #4A5568;
      --text-muted: #718096;
      --border: #E2E8F0;
      --border-light: #EDF2F7;
      --green: #059669;
      --green-light: #ECFDF5;
      --red: #DC2626;
      --red-light: #FEF2F2;
      --yellow: #D69E2E;
      --yellow-light: #FEFCE8;
      --sidebar-w: 220px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-pill: 100px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 14px rgba(0,0,0,0.08);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.10);
      --font: 'Noto Sans TC', 'Inter', -apple-system, sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; font-size:24px; scroll-snap-type:y mandatory; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-body);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      font-size: 1rem;
    }

    /* Progress */
    #scroll-progress {
      position:fixed; top:0; left:0; height:3px;
      background: linear-gradient(90deg, var(--orange), var(--golden));
      z-index:9999; transition:width 0.15s;
    }

    /* Sidebar */
    .sidebar {
      position:fixed; top:0; left:0; bottom:0;
      width: var(--sidebar-w); background: var(--deep-blue);
      z-index:1000; display:flex; flex-direction:column;
      padding: 32px 0;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 0 24px; margin-bottom: 36px;
      font-size: 0.85rem; font-weight: 800;
      color: var(--orange); letter-spacing: 0.04em;
    }
    .sidebar-logo span { color: rgba(255,255,255,0.5); font-weight: 400; }
    .nav-list { display:flex; flex-direction:column; gap:2px; padding: 0 12px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; font-size: 0.88rem; font-weight: 500;
      color: rgba(255,255,255,0.55); border-radius: var(--radius-sm);
      cursor:pointer; border:none; background:none; font-family:var(--font);
      transition: all 0.2s; text-align:left; width:100%;
    }
    .nav-link:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.06); }
    .nav-link.active {
      color: #fff; background: rgba(255,255,255,0.1);
      font-weight: 700; border-left: 3px solid var(--orange);
    }
    .nav-num {
      font-size: 0.72rem; font-weight: 700; opacity: 0.5;
      min-width: 18px;
    }

    /* Main Content */
    .main { margin-left: var(--sidebar-w); }
    .page-wrap { max-width: 1050px; margin: 0 auto; padding: 0 40px; width:100%; }
    section {
      padding: 60px 0;
      min-height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
    }

    /* Hero */
    .hero {
      min-height: 100vh; display:flex; align-items:center;
      background: linear-gradient(135deg, var(--deep-blue) 0%, var(--navy) 100%);
      position:relative; overflow:hidden; padding:0;
    }
    .hero::before {
      content:''; position:absolute; top:-150px; right:-150px;
      width:500px; height:500px;
      background: radial-gradient(circle, rgba(232,93,4,0.15) 0%, transparent 70%);
      border-radius:50%;
    }
    .hero-content { position:relative; z-index:1; }
    .hero-badge {
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 18px; background:rgba(232,93,4,0.15);
      color:var(--orange); font-size:0.88rem; font-weight:700;
      border-radius:var(--radius-pill); margin-bottom:28px;
      border:1px solid rgba(232,93,4,0.25);
    }
    .hero-badge::before { content:''; width:8px; height:8px; background:var(--orange); border-radius:50%; }
    .hero h1 {
      font-size: 3rem; font-weight:900; line-height:1.25;
      color:#fff; margin-bottom:20px; letter-spacing:-0.02em;
    }
    .hero h1 .accent { color: var(--orange); }
    .hero-sub {
      font-size:1.12rem; color:rgba(255,255,255,0.65); max-width:580px;
      line-height:1.9; margin-bottom:32px;
    }
    .hero-meta {
      display:flex; gap:24px; font-size:0.9rem; color:rgba(255,255,255,0.4);
    }

    /* Section Header */
    .section-head { margin-bottom:32px; }
    .section-num {
      font-size:0.78rem; font-weight:700; color:var(--orange);
      letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px;
    }
    .section-title {
      font-size:1.9rem; font-weight:800; color:var(--text-primary);
      letter-spacing:-0.02em; line-height:1.3;
    }
    .section-subtitle { font-size:1rem; color:var(--text-secondary); margin-top:6px; }

    /* Cards */
    .card {
      background:var(--bg-card); border-radius:var(--radius-lg);
      padding:32px; box-shadow:var(--shadow-sm); border:1px solid var(--border);
      transition:box-shadow 0.3s, transform 0.3s;
    }
    .card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }

    /* Stat Cards */
    .stats-grid { display:grid; gap:20px; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); }
    .stat-card {
      background:var(--bg-card); border-radius:var(--radius-lg);
      padding:26px; position:relative; overflow:hidden;
      border:1px solid var(--border); transition:box-shadow 0.3s, transform 0.3s;
    }
    .stat-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .stat-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; }
    .stat-card--orange::before { background:var(--orange); }
    .stat-card--blue::before { background:var(--navy); }
    .stat-card--green::before { background:var(--green); }
    .stat-card--golden::before { background:var(--golden); }
    .stat-card--red::before { background:var(--red); }
    .stat-label { font-size:0.88rem; font-weight:600; color:var(--text-secondary); margin-bottom:8px; }
    .stat-num { font-size:2.2rem; font-weight:900; letter-spacing:-0.03em; color:var(--text-primary); line-height:1.1; }
    .stat-note { font-size:0.82rem; color:var(--text-muted); margin-top:8px; }

    /* Table */
    .data-table { width:100%; border-collapse:separate; border-spacing:0; font-size:0.92rem; }
    .data-table th {
      text-align:left; padding:14px 16px; font-weight:700;
      color:var(--text-secondary); font-size:0.82rem;
      text-transform:uppercase; letter-spacing:0.05em;
      border-bottom:2px solid var(--border); background:var(--bg);
    }
    .data-table td { padding:14px 16px; border-bottom:1px solid var(--border-light); color:var(--text-body); }
    .data-table tbody tr:hover { background:var(--bg); }

    /* Badge */
    .badge {
      display:inline-block; padding:3px 10px; font-size:0.78rem;
      font-weight:700; border-radius:var(--radius-pill);
    }
    .badge--good { background:var(--green-light); color:var(--green); }
    .badge--warn { background:var(--yellow-light); color:var(--yellow); }
    .badge--critical { background:var(--red-light); color:var(--red); }
    .badge--primary { background:var(--orange-light); color:var(--orange); }
    .badge--blue { background:var(--light-blue); color:var(--navy); }

    /* Bar in table */
    .pct-bar-wrap { display:flex; align-items:center; gap:10px; }
    .pct-bar-track { flex:1; height:8px; background:var(--border-light); border-radius:4px; overflow:hidden; max-width:120px; }
    .pct-bar-fill { height:100%; border-radius:4px; transition:width 1s ease; }
    .pct-bar-fill--good { background:var(--green); }
    .pct-bar-fill--warn { background:var(--yellow); }
    .pct-bar-fill--critical { background:var(--red); }

    /* Pie */
    .pie-section { display:flex; align-items:center; gap:48px; flex-wrap:wrap; justify-content:center; }
    .pie-legend { display:flex; flex-direction:column; gap:14px; }
    .pie-legend-item { display:flex; align-items:center; gap:10px; font-size:0.95rem; color:var(--text-body); }
    .pie-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }

    /* Bar Chart */
    .bar-chart { display:flex; flex-direction:column; gap:14px; }
    .bar-row { display:grid; grid-template-columns:200px 1fr 80px; align-items:center; gap:14px; font-size:0.9rem; }
    .bar-label { color:var(--text-body); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bar-track { height:30px; background:var(--bg); border-radius:var(--radius-pill); overflow:hidden; }
    .bar-fill { height:100%; border-radius:var(--radius-pill); transition:width 1.2s cubic-bezier(0.22,1,0.36,1); min-width:4px; }
    .bar-fill--orange { background:linear-gradient(90deg, var(--orange), var(--golden)); }
    .bar-fill--blue { background:linear-gradient(90deg, var(--navy), var(--muted-blue)); }
    .bar-value { font-weight:800; color:var(--text-primary); text-align:right; font-variant-numeric:tabular-nums; }

    /* Solution */
    .solution-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
    .solution-card {
      background:var(--bg-card); border-radius:var(--radius-lg);
      padding:32px; border:1px solid var(--border);
      transition:all 0.3s; position:relative; overflow:hidden;
    }
    .solution-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-3px); }
    .solution-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:4px; }
    .solution-card--domestic::after { background:linear-gradient(90deg, var(--orange), var(--golden)); }
    .solution-card--overseas::after { background:linear-gradient(90deg, var(--navy), var(--muted-blue)); }
    .solution-tag {
      display:inline-block; padding:5px 14px;
      font-size:0.8rem; font-weight:700; border-radius:var(--radius-pill); margin-bottom:16px;
    }
    .solution-tag--domestic { background:var(--orange-light); color:var(--orange); }
    .solution-tag--overseas { background:var(--light-blue); color:var(--navy); }

    /* Callout */
    .callout { padding:24px 28px; border-radius:var(--radius-md); border-left:4px solid; margin:24px 0; }
    .callout--orange { background:var(--orange-light); border-color:var(--orange); }
    .callout--blue { background:var(--light-blue); border-color:var(--navy); }
    .callout--green { background:var(--green-light); border-color:var(--green); }
    .callout-title { font-size:0.95rem; font-weight:700; margin-bottom:6px; }
    .callout-body { font-size:0.95rem; line-height:1.8; }

    /* Highlight Section */
    .highlight-section { background: var(--deep-blue); padding:80px 0; }
    .highlight-section .section-num { color:var(--golden); }
    .highlight-section .section-title { color:#fff; }

    /* Footer */
    .footer { padding:32px 0; text-align:center; font-size:0.82rem; color:var(--text-muted); border-top:1px solid var(--border); }

    /* Back to top */
    .back-to-top {
      position:fixed; bottom:32px; right:32px;
      width:46px; height:46px; border-radius:50%;
      background:var(--orange); color:white; border:none;
      cursor:pointer; font-size:1.2rem; box-shadow:var(--shadow-lg);
      display:flex; align-items:center; justify-content:center;
      opacity:0; transform:translateY(20px); transition:all 0.3s; z-index:999;
    }
    .back-to-top.visible { opacity:1; transform:translateY(0); }
    .back-to-top:hover { background:var(--navy); }

    /* Reveal */
    .reveal { opacity:0; transform:translateY(24px); transition:opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    /* Two col */
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:32px; align-items:start; }

    /* Solution item */
    .sol-item {
      background: var(--white);
      border-left: 3px solid var(--orange);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 14px 20px;
      margin-bottom: 12px;
      transition: box-shadow 0.2s;
    }
    .sol-item:hover { box-shadow: var(--shadow-sm); }
    .sol-item--blue { border-left-color: var(--navy); }
    .sol-item--golden { border-left-color: var(--golden); }
    .sol-item-title { font-size:0.92rem; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
    .sol-item-body { font-size:0.88rem; color:var(--text-body); line-height:1.8; }
    .sol-item-effect {
      display:inline-block; margin-top:6px; padding:4px 12px;
      background:var(--green-light); color:var(--green);
      font-size:0.82rem; font-weight:600; border-radius:var(--radius-pill);
    }

    /* Image overlay for zoom */
    .img-zoom-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.85); z-index:10000;
      display:flex; align-items:center; justify-content:center;
      cursor:zoom-out;
    }
    .img-zoom-overlay img {
      max-width:90vw; max-height:90vh;
      border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,0.5);
    }

    /* Responsive */
    @media (max-width:900px) {
      .sidebar { display:none; }
      .main { margin-left:0; }
      .hero h1 { font-size:2rem; }
      .stats-grid { grid-template-columns:1fr; }
      .solution-grid { grid-template-columns:1fr; }
      .two-col { grid-template-columns:1fr; }
      .bar-row { grid-template-columns:140px 1fr 70px; }
      section { padding:40px 0; }
      .page-wrap { padding:0 20px; }
    }
  </style>
</head>
<body>
  <div id="scroll-progress" style="width:0%"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DATA = {
      nav: ['首頁','挑選問題','分佈概況','資料剖析','解決方案'],
      hero: {
        title:['TAITRA數據治理','HB公司重複問題解決方案建議'],
        sub:'提升Hubspot使用率為目標，運用自動化清整與強化資料工具，持續觀察與監控。',
        author:'數據分析組｜Data Steward｜怯婷芳',
        date:'2026.04.17'
      },
      dup: { total:238175, nonDup:61573, dupPct:78.8, domestic:30903, overseas:204935 }
    };

    const fmt = n => n.toLocaleString('en-US');

    function useReveal(th=0.15) {
      const ref = useRef(null);
      const [vis,setVis] = useState(false);
      useEffect(() => {
        const el = ref.current; if(!el) return;
        const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting){setVis(true);obs.disconnect();} }, {threshold:th});
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref,vis];
    }
    function Reveal({children,delay=0,className=''}) {
      const [ref,vis] = useReveal();
      return <div ref={ref} className={`reveal ${vis?'visible':''} ${className}`} style={{transitionDelay:`${delay}ms`}}>{children}</div>;
    }
    function Counter({end,duration=1800,suffix=''}) {
      const [val,setVal] = useState(0);
      const [ref,vis] = useReveal();
      useEffect(() => {
        if(!vis) return;
        const st = performance.now();
        const tick = now => {
          const p = Math.min((now-st)/duration,1);
          setVal(Math.round((1-Math.pow(1-p,3))*end));
          if(p<1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }, [vis,end]);
      return <span ref={ref}>{fmt(val)}{suffix}</span>;
    }

    /* Sidebar Nav */
    function Sidebar() {
      const [active,setActive] = useState(0);
      useEffect(() => {
        const onScroll = () => {
          const h = document.documentElement.scrollHeight - window.innerHeight;
          document.getElementById('scroll-progress').style.width = (h>0?(window.scrollY/h)*100:0)+'%';
          const secs = document.querySelectorAll('section[id]');
          let cur = 0;
          secs.forEach((s,i) => { if(window.scrollY >= s.offsetTop - 200) cur = i; });
          setActive(cur);
        };
        window.addEventListener('scroll',onScroll,{passive:true});
        return () => window.removeEventListener('scroll',onScroll);
      },[]);
      return (
        <nav className="sidebar">
          <div className="sidebar-logo">TAITRA <span>DG</span></div>
          <div className="nav-list">
            {DATA.nav.map((label,i) => (
              <button key={i} className={`nav-link ${active===i?'active':''}`}
                onClick={() => { const el=document.querySelectorAll('section[id]')[i]; if(el) el.scrollIntoView({behavior:'smooth'}); }}>
                <span className="nav-num">{String(i).padStart(2,'0')}</span>
                {label}
              </button>
            ))}
          </div>
        </nav>
      );
    }

    function BackToTop() {
      const [vis,setVis] = useState(false);
      useEffect(() => {
        const h = () => setVis(window.scrollY>600);
        window.addEventListener('scroll',h,{passive:true});
        return () => window.removeEventListener('scroll',h);
      },[]);
      return <button className={`back-to-top ${vis?'visible':''}`} onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}>↑</button>;
    }

    /* 00 — 首頁 (fonts adjusted: original +20% then -10% = +8% from original) */
    function HeroSection() {
      const d = DATA.hero;
      return (
        <section id="sec-0" className="hero">
          <div className="page-wrap hero-content">
            <Reveal delay={100}><h1 style={{fontSize:'3.78rem'}}>{d.title[0]}</h1></Reveal>
            <Reveal delay={150}><div style={{fontSize:'1.73rem',fontWeight:700,color:'var(--orange)',marginBottom:'26px',letterSpacing:'-0.01em'}}>{d.title[1]}</div></Reveal>
            <Reveal delay={200}><p className="hero-sub" style={{fontSize:'1.21rem'}}>{d.sub}</p></Reveal>
            <Reveal delay={300}><div className="hero-meta" style={{fontSize:'0.97rem'}}><span>👤 {d.author}</span><span>📅 {d.date}</span></div></Reveal>
          </div>
        </section>
      );
    }

    /* 01 — 重複分析 */
    function DuplicateSection() {
      const d = DATA.dup;
      const r=80, c=2*Math.PI*r;
      const dupLen = (d.total/(d.total+d.nonDup))*c;
      return (
        <section id="sec-1" style={{background:'var(--white)'}}>
          <div className="page-wrap">
            <Reveal><div className="section-head">
              <div className="section-num">01 — Select & Define</div>
              <div className="section-title">挑選問題-資料唯一性(Uniqueness)</div>
              <div className="section-subtitle">匯入的公司中，有多少是重複的？</div>
            </div></Reveal>
            <div className="two-col">
              <Reveal delay={100}>
                <div className="stats-grid" style={{gridTemplateColumns:'1fr'}}>
                  <div className="stat-card stat-card--red">
                    <div className="stat-label">重複公司數</div>
                    <div className="stat-num" style={{color:'var(--red)'}}><Counter end={d.total}/></div>
                    <div className="stat-note">佔匯入公司 {d.dupPct}%</div>
                  </div>
                  <div className="stat-card stat-card--green">
                    <div className="stat-label">非重複公司數</div>
                    <div className="stat-num"><Counter end={d.nonDup}/></div>
                    <div className="stat-note">佔匯入公司 {(100-d.dupPct).toFixed(1)}%</div>
                  </div>
                </div>
              </Reveal>
              <Reveal delay={200}>
                <div className="card" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                  <div className="pie-section">
                    <svg width="200" height="200" viewBox="0 0 200 200">
                      <circle cx="100" cy="100" r={r} fill="none" stroke="var(--border)" strokeWidth="24"/>
                      <circle cx="100" cy="100" r={r} fill="none" stroke="var(--orange)" strokeWidth="24"
                        strokeDasharray={`${dupLen} ${c-dupLen}`} strokeDashoffset={c/4} strokeLinecap="round"/>
                      <text x="100" y="95" textAnchor="middle" fontSize="26" fontWeight="900" fill="var(--text-primary)">
                        {d.dupPct}%
                      </text>
                      <text x="100" y="118" textAnchor="middle" fontSize="12" fill="var(--text-muted)">重複比例</text>
                    </svg>
                    <div className="pie-legend">
                      <div className="pie-legend-item">
                        <div className="pie-dot" style={{background:'var(--orange)'}}/><span><strong>{fmt(d.total)}</strong> 重複</span>
                      </div>
                      <div className="pie-legend-item">
                        <div className="pie-dot" style={{background:'var(--border)'}}/><span><strong>{fmt(d.nonDup)}</strong> 非重複</span>
                      </div>
                    </div>
                  </div>
                </div>
              </Reveal>
            </div>
          </div>
        </section>
      );
    }

    /* 02 — 分佈概況 */
    function DistributionSection() {
      return (
        <section id="sec-2" style={{background:'var(--bg)',padding:'28px 0'}}>
          <div className="page-wrap">
