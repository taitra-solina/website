<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HB 公司重複問題 — 解決方案建議</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --white: #FFFFFF;
      --bg: #F5F6FA;
      --bg-card: #FFFFFF;
      --orange: #E85D04;
      --orange-dark: #C44D03;
      --orange-light: #FFF1E8;
      --orange-soft: #FFD6BA;
      --deep-blue: #1B2A4A;
      --navy: #253B6E;
      --muted-blue: #4A6FA5;
      --light-blue: #E8EEF6;
      --pale-blue: #D6E4F0;
      --golden: #E6940A;
      --text-primary: #1A1A2E;
      --text-body: #2D3748;
      --text-secondary: #4A5568;
      --text-muted: #718096;
      --border: #E2E8F0;
      --border-light: #EDF2F7;
      --green: #059669;
      --green-light: #ECFDF5;
      --red: #DC2626;
      --red-light: #FEF2F2;
      --yellow: #D69E2E;
      --yellow-light: #FEFCE8;
      --sidebar-w: 220px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-pill: 100px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 14px rgba(0,0,0,0.08);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.10);
      --font: 'Noto Sans TC', 'Inter', -apple-system, sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; font-size:24px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-body);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      font-size: 1rem;
    }

    /* Progress */
    #scroll-progress {
      position:fixed; top:0; left:0; height:3px;
      background: linear-gradient(90deg, var(--orange), var(--golden));
      z-index:9999; transition:width 0.15s;
    }

    /* Sidebar */
    .sidebar {
      position:fixed; top:0; left:0; bottom:0;
      width: var(--sidebar-w); background: var(--deep-blue);
      z-index:1000; display:flex; flex-direction:column;
      padding: 32px 0;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 0 24px; margin-bottom: 36px;
      font-size: 0.85rem; font-weight: 800;
      color: var(--orange); letter-spacing: 0.04em;
    }
    .sidebar-logo span { color: rgba(255,255,255,0.5); font-weight: 400; }
    .nav-list { display:flex; flex-direction:column; gap:2px; padding: 0 12px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; font-size: 0.88rem; font-weight: 500;
      color: rgba(255,255,255,0.55); border-radius: var(--radius-sm);
      cursor:pointer; border:none; background:none; font-family:var(--font);
      transition: all 0.2s; text-align:left; width:100%;
    }
    .nav-link:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.06); }
    .nav-link.active {
      color: #fff; background: rgba(255,255,255,0.1);
      font-weight: 700; border-left: 3px solid var(--orange);
    }
    .nav-num {
      font-size: 0.72rem; font-weight: 700; opacity: 0.5;
      min-width: 18px;
    }

    /* Main Content */
    .main { margin-left: var(--sidebar-w); }
    .page-wrap { max-width: 1050px; margin: 0 auto; padding: 0 40px; }
    section { padding: 90px 0; }

    /* Hero */
    .hero {
      min-height: 100vh; display:flex; align-items:center;
      background: linear-gradient(135deg, var(--deep-blue) 0%, var(--navy) 100%);
      position:relative; overflow:hidden;
    }
    .hero::before {
      content:''; position:absolute; top:-150px; right:-150px;
      width:500px; height:500px;
      background: radial-gradient(circle, rgba(232,93,4,0.15) 0%, transparent 70%);
      border-radius:50%;
    }
    .hero-content { position:relative; z-index:1; }
    .hero-badge {
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 18px; background:rgba(232,93,4,0.15);
      color:var(--orange); font-size:0.88rem; font-weight:700;
      border-radius:var(--radius-pill); margin-bottom:28px;
      border:1px solid rgba(232,93,4,0.25);
    }
    .hero-badge::before { content:''; width:8px; height:8px; background:var(--orange); border-radius:50%; }
    .hero h1 {
      font-size: 3rem; font-weight:900; line-height:1.25;
      color:#fff; margin-bottom:20px; letter-spacing:-0.02em;
    }
    .hero h1 .accent { color: var(--orange); }
    .hero-sub {
      font-size:1.12rem; color:rgba(255,255,255,0.65); max-width:580px;
      line-height:1.9; margin-bottom:32px;
    }
    .hero-meta {
      display:flex; gap:24px; font-size:0.9rem; color:rgba(255,255,255,0.4);
    }

    /* Section Header */
    .section-head { margin-bottom:44px; }
    .section-num {
      font-size:0.78rem; font-weight:700; color:var(--orange);
      letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px;
    }
    .section-title {
      font-size:1.9rem; font-weight:800; color:var(--text-primary);
      letter-spacing:-0.02em; line-height:1.3;
    }
    .section-subtitle { font-size:1rem; color:var(--text-secondary); margin-top:6px; }

    /* Cards */
    .card {
      background:var(--bg-card); border-radius:var(--radius-lg);
      padding:32px; box-shadow:var(--shadow-sm); border:1px solid var(--border);
      transition:box-shadow 0.3s, transform 0.3s;
    }
    .card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }

    /* Stat Cards */
    .stats-grid { display:grid; gap:20px; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); }
    .stat-card {
      background:var(--bg-card); border-radius:var(--radius-lg);
      padding:26px; position:relative; overflow:hidden;
      border:1px solid var(--border); transition:box-shadow 0.3s, transform 0.3s;
    }
    .stat-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .stat-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; }
    .stat-card--orange::before { background:var(--orange); }
    .stat-card--blue::before { background:var(--navy); }
    .stat-card--green::before { background:var(--green); }
    .stat-card--golden::before { background:var(--golden); }
    .stat-card--red::before { background:var(--red); }
    .stat-label { font-size:0.88rem; font-weight:600; color:var(--text-secondary); margin-bottom:8px; }
    .stat-num { font-size:2.2rem; font-weight:900; letter-spacing:-0.03em; color:var(--text-primary); line-height:1.1; }
    .stat-note { font-size:0.82rem; color:var(--text-muted); margin-top:8px; }

    /* Table */
    .data-table { width:100%; border-collapse:separate; border-spacing:0; font-size:0.92rem; }
    .data-table th {
      text-align:left; padding:14px 16px; font-weight:700;
      color:var(--text-secondary); font-size:0.82rem;
      text-transform:uppercase; letter-spacing:0.05em;
      border-bottom:2px solid var(--border); background:var(--bg);
    }
    .data-table td { padding:14px 16px; border-bottom:1px solid var(--border-light); color:var(--text-body); }
    .data-table tbody tr:hover { background:var(--bg); }

    /* Badge */
    .badge {
      display:inline-block; padding:3px 10px; font-size:0.78rem;
      font-weight:700; border-radius:var(--radius-pill);
    }
    .badge--good { background:var(--green-light); color:var(--green); }
    .badge--warn { background:var(--yellow-light); color:var(--yellow); }
    .badge--critical { background:var(--red-light); color:var(--red); }
    .badge--primary { background:var(--orange-light); color:var(--orange); }
    .badge--blue { background:var(--light-blue); color:var(--navy); }

    /* Bar in table */
    .pct-bar-wrap { display:flex; align-items:center; gap:10px; }
    .pct-bar-track { flex:1; height:8px; background:var(--border-light); border-radius:4px; overflow:hidden; max-width:120px; }
    .pct-bar-fill { height:100%; border-radius:4px; transition:width 1s ease; }
    .pct-bar-fill--good { background:var(--green); }
    .pct-bar-fill--warn { background:var(--yellow); }
    .pct-bar-fill--critical { background:var(--red); }

    /* Pie */
    .pie-section { display:flex; align-items:center; gap:48px; flex-wrap:wrap; justify-content:center; }
    .pie-legend { display:flex; flex-direction:column; gap:14px; }
    .pie-legend-item { display:flex; align-items:center; gap:10px; font-size:0.95rem; color:var(--text-body); }
    .pie-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }

    /* Bar Chart */
    .bar-chart { display:flex; flex-direction:column; gap:14px; }
    .bar-row { display:grid; grid-template-columns:200px 1fr 80px; align-items:center; gap:14px; font-size:0.9rem; }
    .bar-label { color:var(--text-body); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bar-track { height:30px; background:var(--bg); border-radius:var(--radius-pill); overflow:hidden; }
    .bar-fill { height:100%; border-radius:var(--radius-pill); transition:width 1.2s cubic-bezier(0.22,1,0.36,1); min-width:4px; }
    .bar-fill--orange { background:linear-gradient(90deg, var(--orange), var(--golden)); }
    .bar-fill--blue { background:linear-gradient(90deg, var(--navy), var(--muted-blue)); }
    .bar-value { font-weight:800; color:var(--text-primary); text-align:right; font-variant-numeric:tabular-nums; }

    /* Timeline */
    .timeline { display:flex; flex-direction:column; gap:0; position:relative; padding-left:28px; }
    .timeline::before {
      content:''; position:absolute; left:7px; top:8px; bottom:8px;
      width:2px; background:var(--border);
    }
    .tl-item { position:relative; padding:16px 0 16px 24px; }
    .tl-item::before {
      content:''; position:absolute; left:-24px; top:22px;
      width:12px; height:12px; border-radius:50%;
      background:var(--bg-card); border:3px solid var(--orange);
    }
    .tl-item:last-child::before { background:var(--orange); border-color:var(--orange); }
    .tl-date { font-size:0.82rem; font-weight:700; color:var(--orange); margin-bottom:4px; }
    .tl-text { font-size:0.95rem; color:var(--text-body); line-height:1.7; }

    /* Steps */
    .steps-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
    .step-card {
      background:var(--bg-card); border-radius:var(--radius-lg);
      padding:28px; border:1px solid var(--border); transition:all 0.3s;
    }
    .step-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); border-color:var(--orange-soft); }
    .step-num-circle {
      display:inline-flex; align-items:center; justify-content:center;
      width:40px; height:40px; border-radius:50%;
      background:var(--orange); color:white;
      font-size:0.92rem; font-weight:800; margin-bottom:16px;
    }
    .step-card h4 { font-size:1.05rem; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
    .step-card .step-zh { font-size:0.88rem; color:var(--orange); font-weight:600; margin-bottom:10px; }
    .step-card p { font-size:0.9rem; color:var(--text-secondary); line-height:1.7; }

    /* Fields */
    .field-item {
      display:flex; align-items:center; gap:14px;
      padding:14px 20px; background:var(--bg-card);
      border-radius:var(--radius-md); border:1px solid var(--border);
      font-size:0.95rem; transition:all 0.2s;
    }
    .field-item:hover { border-color:var(--orange-soft); background:var(--orange-light); }
    .field-idx {
      width:30px; height:30px; border-radius:50%;
      background:var(--light-blue); color:var(--navy);
      display:flex; align-items:center; justify-content:center;
      font-size:0.82rem; font-weight:700; flex-shrink:0;
    }
    .field-name { font-weight:600; color:var(--text-primary); font-family:'Inter',monospace; }

    /* Report Links */
    .report-link {
      display:flex; align-items:center; gap:12px;
      padding:14px 20px; background:var(--bg-card);
      border-radius:var(--radius-md); border:1px solid var(--border);
      font-size:0.92rem; font-weight:600; color:var(--navy);
      text-decoration:none; transition:all 0.2s; cursor:pointer;
    }
    .report-link:hover { border-color:var(--orange); background:var(--orange-light); color:var(--orange); }
    .report-link .link-icon {
      width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:0.75rem; flex-shrink:0;
    }

    /* Solution */
    .solution-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
    .solution-card {
      background:var(--bg-card); border-radius:var(--radius-lg);
      padding:32px; border:1px solid var(--border);
      transition:all 0.3s; position:relative; overflow:hidden;
    }
    .solution-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-3px); }
    .solution-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:4px; }
    .solution-card--domestic::after { background:linear-gradient(90deg, var(--orange), var(--golden)); }
    .solution-card--overseas::after { background:linear-gradient(90deg, var(--navy), var(--muted-blue)); }
    .solution-tag {
      display:inline-block; padding:5px 14px;
      font-size:0.8rem; font-weight:700; border-radius:var(--radius-pill); margin-bottom:16px;
    }
    .solution-tag--domestic { background:var(--orange-light); color:var(--orange); }
    .solution-tag--overseas { background:var(--light-blue); color:var(--navy); }
    .solution-card h3 { font-size:1.25rem; font-weight:800; color:var(--text-primary); margin-bottom:12px; }
    .solution-card .flow {
      display:flex; align-items:center; gap:8px; margin:16px 0; font-size:0.95rem; font-weight:600;
    }
    .flow-step { padding:7px 18px; border-radius:var(--radius-pill); background:var(--bg); color:var(--text-body); }
    .flow-arrow { color:var(--text-muted); font-size:1.1rem; }
    .solution-card ul { list-style:none; padding:0; }
    .solution-card li {
      padding:10px 0; font-size:0.95rem; color:var(--text-body);
      border-bottom:1px solid var(--border-light);
      display:flex; align-items:flex-start; gap:12px;
    }
    .solution-card li:last-child { border:none; }
    .li-icon {
      width:24px; height:24px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:0.75rem; font-weight:700; margin-top:2px;
    }
    .li-icon--orange { background:var(--orange-light); color:var(--orange); }
    .li-icon--blue { background:var(--light-blue); color:var(--navy); }

    /* Callout */
    .callout { padding:24px 28px; border-radius:var(--radius-md); border-left:4px solid; margin:24px 0; }
    .callout--orange { background:var(--orange-light); border-color:var(--orange); }
    .callout--blue { background:var(--light-blue); border-color:var(--navy); }
    .callout-title { font-size:0.95rem; font-weight:700; margin-bottom:6px; }
    .callout-body { font-size:0.95rem; line-height:1.8; }

    /* Highlight Section */
    .highlight-section { background: var(--deep-blue); padding:80px 0; }
    .highlight-section .section-num { color:var(--golden); }
    .highlight-section .section-title { color:#fff; }

    /* Closing */
    .closing { background:var(--white); text-align:center; padding:120px 0; }
    .closing h2 { font-size:2.4rem; font-weight:900; color:var(--text-primary); letter-spacing:-0.02em; margin-bottom:20px; }
    .closing .hl { color:var(--orange); }
    .closing p { font-size:1.08rem; color:var(--text-secondary); max-width:520px; margin:0 auto; line-height:1.9; }

    /* Footer */
    .footer { padding:32px 0; text-align:center; font-size:0.82rem; color:var(--text-muted); border-top:1px solid var(--border); }

    /* Back to top */
    .back-to-top {
      position:fixed; bottom:32px; right:32px;
      width:46px; height:46px; border-radius:50%;
      background:var(--orange); color:white; border:none;
      cursor:pointer; font-size:1.2rem; box-shadow:var(--shadow-lg);
      display:flex; align-items:center; justify-content:center;
      opacity:0; transform:translateY(20px); transition:all 0.3s; z-index:999;
    }
    .back-to-top.visible { opacity:1; transform:translateY(0); }
    .back-to-top:hover { background:var(--navy); }

    /* Reveal */
    .reveal { opacity:0; transform:translateY(24px); transition:opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    /* Two col */
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:32px; align-items:start; }

    /* Responsive */
    @media (max-width:900px) {
      .sidebar { display:none; }
      .main { margin-left:0; }
      .hero h1 { font-size:2rem; }
      .stats-grid { grid-template-columns:1fr; }
      .steps-grid { grid-template-columns:1fr; }
      .solution-grid { grid-template-columns:1fr; }
      .two-col { grid-template-columns:1fr; }
      .bar-row { grid-template-columns:140px 1fr 70px; }
      section { padding:60px 0; }
      .page-wrap { padding:0 20px; }
    }
  </style>
</head>

    function useReveal(th=0.15) {
      const ref = useRef(null);
      const [vis,setVis] = useState(false);
      useEffect(() => {
        const el = ref.current; if(!el) return;
        const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting){setVis(true);obs.disconnect();} }, {threshold:th});
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref,vis];
    }
    function Reveal({children,delay=0,className=''}) {
      const [ref,vis] = useReveal();
      return <div ref={ref} className={`reveal ${vis?'visible':''} ${className}`} style={{transitionDelay:`${delay}ms`}}>{children}</div>;
    }
    function Counter({end,duration=1800,suffix=''}) {
      const [val,setVal] = useState(0);
      const [ref,vis] = useReveal();
      useEffect(() => {
        if(!vis) return;
        const st = performance.now();
        const tick = now => {
          const p = Math.min((now-st)/duration,1);
          setVal(Math.round((1-Math.pow(1-p,3))*end));
          if(p<1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }, [vis,end]);
      return <span ref={ref}>{fmt(val)}{suffix}</span>;
    }
    function AnimBar({width,color='orange'}) {
      const [ref,vis] = useReveal(0.1);
      return <div className="bar-track" ref={ref}><div className={`bar-fill bar-fill--${color}`} style={{width:vis?`${width}%`:'0%'}}/></div>;
    }

          let cur = 0;
          secs.forEach((s,i) => { if(window.scrollY >= s.offsetTop - 200) cur = i; });
